<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-4Q6Gf2aSP4eDXB8Miphtr37CMZZQ5oXLH2yaXMJ2w8e2ZtHTl7GptT4jmndRuHDT" crossorigin="anonymous">
    <title>ООО "Оверпрайс"</title>
</head>
<body style="background-color: #787b94">
    <nav class="navbar navbar-expand-lg bg-body-tertiary mb-3">
        <div class="container-fluid">
            <a class="navbar-brand" href="/firstapp/">ООО "Оверпрайс"</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav">
                    <li class="nav-item">
                        <a class="nav-link active" aria-current="page" href="/firstapp/catalog">Каталог</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" aria-current="page" href="/firstapp/cart">Корзина</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>
    <div class="container-md">
        <div class="card">
            <div class="card-body">
                <h1 class="card-title text-center">Добро пожаловать в ООО "Оверпрайс"</h1>
                <h3 class="card-text text-center">Куча товаров по завышенным ценам</h3>
            </div>
        </div>
        <hr>
        <h1>Топ товаров</h1>
        <div id="carouselExample" class="carousel slide">
            <div class="carousel-inner">
                <div class="carousel-item active">
                    <div class="card mx-auto" style="width: 18rem;">
                        <img src="https://i.pinimg.com/736x/94/72/a6/9472a684b59485064cd128c718313a86.jpg" class="card-img-top" alt="...">
                        <div class="card-body">
                            <h5 class="card-title">Товар 1</h5>
                            <p class="card-text">Описание товара 1</p>
                            <a href="/firstapp/about" class="btn btn-primary">О товаре</a>
                        </div>
                    </div> 
                </div>
                <div class="carousel-item">
                    <div class="card mx-auto" style="width: 18rem;">
                        <img src="https://i.pinimg.com/736x/f7/2b/a9/f72ba986ecdeb963afc8bebf14e23b3b.jpg" class="card-img-top" alt="...">
                        <div class="card-body">
                            <h5 class="card-title">Товар 2</h5>
                            <p class="card-text">Описание товара 2</p>
                            <a href="/firstapp/about" class="btn btn-primary">О товаре</a>
                        </div>
                    </div>
                </div>
            </div>
            <button class="carousel-control-prev" type="button" data-bs-target="#carouselExample" data-bs-slide="prev">
                <span class="carousel-control-prev-icon" aria-hidden="true"></span>
                <span class="visually-hidden">Previous</span>
            </button>
            <button class="carousel-control-next" type="button" data-bs-target="#carouselExample" data-bs-slide="next">
                <span class="carousel-control-next-icon" aria-hidden="true"></span>
                <span class="visually-hidden">Next</span>
            </button>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/js/bootstrap.bundle.min.js" integrity="sha384-j1CDi7MgGQ12Z7Qab0qlWQ/Qqz24Gc6BM0thvEMVjHnfYGF0rmFCozFSxQBxwHKO" crossorigin="anonymous"></script>
</body>
</html>
